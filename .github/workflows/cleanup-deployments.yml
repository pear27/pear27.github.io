name: Cleanup old deployments

on:
  # main 브랜치에 push할 때마다 실행
  push:
    branches: [main]
  # 수동 실행도 가능
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Delete old deployments
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keep = 5; // 최근 5개만 유지

            // 모든 deployment 가져오기 (최신순)
            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              { owner, repo, per_page: 100 }
            );

            console.log(`Total deployments: ${deployments.length}`);

            if (deployments.length <= keep) {
              console.log('Nothing to clean up.');
              return;
            }

            // 최근 N개를 제외한 나머지 삭제
            const toDelete = deployments.slice(keep);
            console.log(`Deleting ${toDelete.length} old deployments...`);

            for (const deployment of toDelete) {
              // 먼저 inactive 상태로 변경
              await github.rest.repos.createDeploymentStatus({
                owner,
                repo,
                deployment_id: deployment.id,
                state: 'inactive',
              });

              // 그 다음 삭제
              await github.rest.repos.deleteDeployment({
                owner,
                repo,
                deployment_id: deployment.id,
              });

              console.log(`Deleted deployment ${deployment.id}`);
            }

            console.log('Cleanup complete!');
